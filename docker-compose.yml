version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: ai-finance-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: ai_finance
      MYSQL_USER: finance
      MYSQL_PASSWORD: finance1234
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: